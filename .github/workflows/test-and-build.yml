name: CI — Test & Build Check

# Runs on feature/develop/staging pushes and on PRs targeting main or staging.
# Does NOT deploy. Purpose: catch broken builds and failing tests early.

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: Install, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (Vite production build)
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:4000/api
          VITE_CLOUDINARY_CLOUD_NAME: placeholder
          VITE_CLOUDINARY_UPLOAD_PRESET: placeholder

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Set up Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
