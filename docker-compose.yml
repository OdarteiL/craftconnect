version: '3.8'

services:
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: craftconnect-db
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER:-craftconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-craftconnect_secret}
      POSTGRES_DB: ${DB_NAME:-craftconnect}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-craftconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: craftconnect-cache
    network_mode: host
    volumes:
      - ./caching/redis.conf:/usr/local/etc/redis/redis.conf
      - redisdata:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: craftconnect-api
    network_mode: host
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: ${DB_USER:-craftconnect}
      DB_PASSWORD: ${DB_PASSWORD:-craftconnect_secret}
      DB_NAME: ${DB_NAME:-craftconnect}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:5173
      COOKIE_PASSWORD: ${COOKIE_PASSWORD:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: craftconnect-ui
    network_mode: host
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
